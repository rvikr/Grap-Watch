<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GRAP Watch — Offline</title>
<meta name="theme-color" content="#ff6b35"/>
<style>
  :root { --bg:#0a0c10; --surface:#12151c; --border:#1e2330; --text:#e8eaf0; --muted:#5a6070; --accent:#ff6b35; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 28px;max-width:360px;width:100%}
  h1{font-size:24px;margin-bottom:8px;letter-spacing:2px}
  .icon{font-size:48px;margin-bottom:16px}
  .msg{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:20px}
  .cached-data{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:20px;text-align:left;font-size:13px;color:var(--muted)}
  .cached-data .val{font-size:28px;font-weight:700;color:var(--text)}
  .retry{display:inline-block;padding:12px 28px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;transition:opacity 0.2s}
  .retry:hover{opacity:0.85}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>GRAP WATCH</h1>
  <div class="msg" id="offlineMsg"></div>
  <div class="cached-data" id="cachedSection" style="display:none">
    <div>Last known AQI</div>
    <div class="val" id="cachedAqi">—</div>
  </div>
  <button class="retry" onclick="location.reload();" id="retryBtn">Retry</button>
</div>
<script>
  const l = (function(){try{return localStorage.getItem('grap-lang')}catch{return null}})() || 'hi';
  const msgs = {
    hi: { msg:'आप ऑफलाइन हैं। कृपया इंटरनेट कनेक्शन जांचें।', retry:'पुनः प्रयास करें' },
    en: { msg:'You are offline. Please check your internet connection.', retry:'Retry' }
  };
  const m = msgs[l] || msgs.hi;
  document.getElementById('offlineMsg').textContent = m.msg;
  document.getElementById('retryBtn').textContent = m.retry;
  // Try to show last known AQI from localStorage
  try {
    const hist = localStorage.getItem('grap-history');
    if (hist) {
      const arr = JSON.parse(hist);
      if (arr.length > 0) {
        const last = arr[arr.length - 1];
        document.getElementById('cachedAqi').textContent = last.aqi;
        document.getElementById('cachedSection').style.display = 'block';
      }
    }
  } catch {}
</script>
</body>
</html>
